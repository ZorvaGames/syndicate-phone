<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }
        .screen { height: 100vh; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .status { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 30px; color: #aaa; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .app { text-align: center; }
        .icon { width: 60px; height: 60px; border-radius: 12px; margin: 0 auto 5px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .browser { background: linear-gradient(45deg, #4285f4, #34a853); }
        .store { background: #333; border: 1px solid #555; }
        .hgram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); display: none; }
    </style>
</head>
<body>
    <div class="screen">
        <div class="status">
            <span id="carrier">Syndicate Mobile</span>
            <span id="data">0 MB</span>
        </div>
        <div class="grid">
            <div class="app"><div class="icon browser">🌐</div><span>Browser</span></div>
            <div class="app"><div class="icon store">🏪</div><span>Store</span></div>
            <div id="hgram-icon" class="app"><div class="icon hgram">📸</div><span>Hustlegram</span></div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        document.getElementById('data').innerText = params.get('data') + " MB";
        
        const apps = params.get('apps') || "";
        if(apps.includes("hustlegram")) {
            document.getElementById('hgram-icon').querySelector('.icon').style.display = 'flex';
        }
    </script>
</body>
</html>
