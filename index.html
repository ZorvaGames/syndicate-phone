<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Syndicate OS</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; overflow: hidden; }
        .status { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 40px; color: #555; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .app-icon { text-align: center; font-size: 10px; cursor: pointer; transition: transform 0.1s; }
        .app-icon:active { transform: scale(0.9); }
        .icon { width: 50px; height: 50px; border-radius: 12px; margin: 0 auto 5px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        /* App Colors */
        .browser { background: #4285F4; }
        .store { background: #34A853; }
        .hgram { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%,#d6249f 60%,#285AEB 90%); }
        .garage { background: #444; border: 1px solid #666; }
        .bank { background: #e53935; }
        .msg { background: #43a047; }
        .contacts { background: #f57c00; }
        .settings { background: #757575; }

        /* The App Screen UI */
        .app-window { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100vh; background: #111; padding: 20px; box-sizing: border-box; }
        .back-btn { background: #333; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
        
        /* Hustlegram Specific UI */
        .hg-window { padding: 0; display: flex; flex-direction: column; }
        .hg-topbar { padding: 15px; background: #000; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .hg-logo { font-size: 18px; font-weight: bold; background: -webkit-linear-gradient(#fdf497, #fd5949, #d6249f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hg-content { flex: 1; overflow-y: auto; padding: 15px; background: #0a0a0a; }
        .hg-bottombar { display: flex; justify-content: space-around; padding: 15px; background: #000; border-top: 1px solid #222; font-size: 20px; }
        .hg-tab { cursor: pointer; opacity: 0.5; transition: 0.2s; }
        .hg-tab.active { opacity: 1; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .hg-btn { background: #222; border: 1px solid #444; color: white; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="home-screen">
        <div class="status">
            <span>📶 Syndicate Mobile</span>
            <span id="data-count">--- MB</span>
        </div>
        <div class="grid">
            <div class="app-icon" onclick="openApp('msg-app')"><div class="icon msg">💬</div>SMS</div>
            <div class="app-icon" onclick="openApp('contacts-app')"><div class="icon contacts">📇</div>Contacts</div>
            <div class="app-icon" onclick="openApp('browser-app')"><div class="icon browser">🌐</div>Browser</div>
            <div class="app-icon" onclick="openApp('bank-app')"><div class="icon bank">🏦</div>Bank</div>
            <div class="app-icon" onclick="openApp('garage-app')"><div class="icon garage">🚘</div>Garage</div>
            <div class="app-icon" onclick="openApp('store-app')"><div class="icon store">🏪</div>Store</div>
            <div id="hgram-icon" class="app-icon" style="display:none;" onclick="openApp('hgram-app')"><div class="icon hgram">📸</div>Hustlegram</div>
            <div class="app-icon" onclick="openApp('settings-app')"><div class="icon settings">⚙️</div>Settings</div>
        </div>
    </div>

    <div id="hgram-app" class="app-window hg-window">
        <div class="hg-topbar">
            <span class="hg-logo" onclick="closeApp()">◀ Hustlegram</span>
            <div>
                <span style="cursor:pointer; margin-right: 15px; font-size: 20px;" onclick="switchHgTab('notify')">❤️</span>
                <span style="cursor:pointer; font-size: 20px;" onclick="switchHgTab('messages')">💬</span>
            </div>
        </div>

        <div id="hg-dynamic-content" class="hg-content">
            </div>

        <div class="hg-bottombar">
            <span id="tab-home" class="hg-tab active" onclick="switchHgTab('home')">🏠</span>
            <span id="tab-reels" class="hg-tab" onclick="switchHgTab('reels')">🎞️</span>
            <span id="tab-explore" class="hg-tab" onclick="switchHgTab('explore')">🔍</span>
            <span id="tab-profile" class="hg-tab" onclick="switchHgTab('profile')">👤</span>
        </div>
    </div>

    <div id="msg-app" class="app-window"><button class="back-btn" onclick="closeApp()">◀ Home</button><h2>💬 SMS</h2><p>Use /msg in bot.</p></div>
    <div id="contacts-app" class="app-window"><button class="back-btn" onclick="closeApp()">◀ Home</button><h2>📇 Contacts</h2></div>
    <div id="browser-app" class="app-window"><button class="back-btn" onclick="closeApp()">◀ Home</button><h2>🌐 Browser</h2></div>
    <div id="bank-app" class="app-window"><button class="back-btn" onclick="closeApp()">◀ Home</button><h2>🏦 Bank</h2></div>
    <div id="store-app" class="app-window"><button class="back-btn" onclick="closeApp()">◀ Home</button><h2>🏪 Store</h2><p>Use /hustlestore in bot.</p></div>
    <div id="garage-app" class="app-window"><button class="back-btn" onclick="closeApp()">◀ Home</button><h2>🚘 Garage</h2></div>
    <div id="settings-app" class="app-window"><button class="back-btn" onclick="closeApp()">◀ Home</button><h2>⚙️ Settings</h2></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('data-count').innerText = (urlParams.get('data') || "0") + " MB";
        if ((urlParams.get('apps') || "").includes("hustlegram")) { document.getElementById('hgram-icon').style.display = "block"; }

        function openApp(appId) {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById(appId).style.display = 'flex';
            if(appId === 'hgram-app') switchHgTab('home'); // Auto load home
        }
        function closeApp() {
            document.querySelectorAll('.app-window').forEach(w => w.style.display = 'none');
            document.getElementById('home-screen').style.display = 'block';
        }

        // --- HUSTLEGRAM LOGIC ---
        function switchHgTab(tabName) {
            // Update active icon glow
            document.querySelectorAll('.hg-tab').forEach(t => t.classList.remove('active'));
            if(document.getElementById('tab-' + tabName)) {
                document.getElementById('tab-' + tabName).classList.add('active');
            }

            const contentDiv = document.getElementById('hg-dynamic-content');
            
            if (tabName === 'home') {
                contentDiv.innerHTML = "<h3>Feed</h3><div style='background:#111; padding:15px; border-radius:8px;'><strong>@Maya_Bot</strong><p>Just bought a new Blista Compact! 🚗💨</p></div>";
            } else if (tabName === 'reels') {
                contentDiv.innerHTML = "<h3>Reels</h3><div style='height:300px; background:#222; display:flex; align-items:center; justify-content:center; border-radius:10px;'>▶️ Swipe Up</div>";
            } else if (tabName === 'explore') {
                contentDiv.innerHTML = "<h3>Explore</h3><p style='color:#aaa'>Trending in Los Santos: #BankHeist #NewCars</p>";
            } else if (tabName === 'profile') {
                contentDiv.innerHTML = `
                    <div style='text-align:center; margin-bottom:20px;'>
                        <div style='width:80px; height:80px; background:#444; border-radius:50%; margin:0 auto 10px;'></div>
                        <h2>Your Profile</h2>
                        <div style='display:flex; justify-content:space-around; background:#111; padding:10px; border-radius:8px;'>
                            <div onclick='alert("Followers list: Maya, John, Toby")' style='cursor:pointer;'><strong>3</strong><br><span style='font-size:12px; color:#aaa'>Followers</span></div>
                            <div onclick='alert("Following list: LSPD_Official, LosSantosNews")' style='cursor:pointer;'><strong>2</strong><br><span style='font-size:12px; color:#aaa'>Following</span></div>
                        </div>
                    </div>
                    <button class='hg-btn' style='width:100%; padding:10px;'>Edit Profile</button>
                `;
            } else if (tabName === 'notify') {
                contentDiv.innerHTML = "<h3>Notifications</h3><p style='color:#aaa; font-size:12px;'>New login detected from Syndicate OS.</p><div style='background:#111; padding:10px; border-radius:5px; margin-bottom:5px;'><strong>@John</strong> started following you.</div><div style='background:#111; padding:10px; border-radius:5px;'>Suggestion: Follow <strong>@Maya</strong></div>";
            } else if (tabName === 'messages') {
                contentDiv.innerHTML = "<h3>Direct Messages</h3><p style='color:#aaa; font-size:12px;'>End-to-end encrypted.</p><div style='background:#111; padding:10px; border-radius:5px;'><strong>@Maya:</strong> Hey, want to do a heist later?</div>";
            }
        }
    </script>
</body>
</html>
